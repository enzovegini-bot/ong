<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Adoção</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Formulário de adoção</h2>

<main>
  <form id="formAdocao">

    <label>Nome:</label>
    <input type="text" id="nome" placeholder="Nome">
     <br>
    <label>Email:</label>
    <input type="email" id="email" placeholder="ex@exemplo.com">
 <br>
    <label>Telefone:</label>
    <input type="text" id="telefone" placeholder="47999999999">
 <br>
    <label>CPF:</label>
    <input type="text" id="cpf" placeholder="00000000000">
 <br>
    <label>Idade:</label>
    <input type="number" id="idade">
 <br>
    <label>Cidade:</label>
    <input type="text" id="cidade">
 <br>
    <label>Moradia:</label>
    <select id="moradia">
      <option value="">Selecione</option>
      <option value="casa">Casa</option>
      <option value="apartamento">Apartamento</option>
    </select>
 <br>
    <label>Possui Quintal?</label>
    <input type="radio" name="quintal" value="sim"> Sim
    <input type="radio" name="quintal" value="nao"> Não
 <br>
    <label>Já teve Pet?</label>
    <input type="radio" name="pet" value="sim"> Sim
    <input type="radio" name="pet" value="nao"> Não

    <br>

    <label>Horas sozinho:</label>
    <input type="number" id="horas">
 <br>
    <label>Motivo:</label>
    <textarea id="motivo"></textarea>
 <br>
    <label><input type="checkbox" id="permite"> Permite animais?</label>
 <br>
    <label><input type="checkbox" id="seguro"> Quintal seguro?</label>
     <br>
    <label><input type="checkbox" id="financeiro"> Condição financeira?</label>
     <br>
    <label><input type="checkbox" id="impulso"> Decisão impulsiva?</label>
     <br>
    <label><input type="checkbox" id="termo"> Aceito os termos</label>
 <br>
    <button type="submit">Enviar</button>

  </form>
</main>

<h3 id="resultado"></h3>

<script src="script.js"></script>
</body>
</html>
